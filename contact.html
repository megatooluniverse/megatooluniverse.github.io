<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MegaToolUniverse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0c4a6e); color: #fff; line-height: 1.6; padding: 2rem; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;}
        .container { max-width: 600px; width: 100%; text-align: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); padding: 3rem 2rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #c084fc; margin-bottom: 1rem; }
        p { color: #cbd5e1; margin-bottom: 2rem; font-size: 1.1rem; }
        
        /* Updated Email Box Styles */
        .email-box { background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 15px; display: inline-block; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 2.5rem; transition: 0.3s; }
        .email-box:hover { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); transform: translateY(-3px); }
        .email-link { font-size: 1.3rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.5px; text-decoration: none; transition: 0.3s; display: flex; align-items: center; gap: 10px; justify-content: center; }
        .email-link:hover { color: #c084fc; text-shadow: 0 0 10px rgba(192, 132, 252, 0.5); }
        
        a.back-btn { display: inline-block; color: #fff; background: #9333ea; padding: 0.8rem 1.5rem; text-decoration: none; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        a.back-btn:hover { background: #c084fc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(147, 51, 234, 0.4);}
        i.mail-icon { font-size: 3rem; color: #c084fc; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-envelope-open-text mail-icon"></i>
        <h1>Get in Touch</h1>
        <p>Have a question, suggestion, or found a bug? We'd love to hear from you. Click the email below to send us a direct message!</p>
        
        <div class="email-box">
            <a href="mailto:megatooluniverse.dev@gmail.com" class="email-link">
                <i class="fas fa-paper-plane"></i> megatooluniverse.dev@gmail.com
            </a>
        </div>
        <br>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Hub</a>
    </div>
</body>
</html>
